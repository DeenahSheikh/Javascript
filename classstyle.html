<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="aiml">
        <h3>CSE AI ML</h3>
        <p>1st Year</p>
        <p>2nd Year</p>
        <p>3rd Year</p>
        <p>4th Year</p>
    </div>

    <div class="aift">
        <h3>CSE AI FT</h3>
        <p>1st Year</p>
        <p>2nd Year</p>
        <p>3rd Year</p>
        <p>4th Year</p>
    </div>

    <button onclick="applyStyle()">Apply Style</button>

    <script>
        function applyStyle(){
            let elements= document.getElementsByClassName("aiml");
            for(let i=0; i<elements.length; i++){
                elements[i].style.color="blue";
                elements[i].style.fontFamily="Arial";
                elements[i].style.backgroundColor="red";
            }
            let element= document.getElementsByClassName("aift");
            for(let j=0; j<element.length; j++){
                element[j].style.color="blue";
                element[j].style.fontFamily="Arial";
                element[j].style.backgroundColor="lightblue";
            }
        }
    </script>
</body>
</html>
