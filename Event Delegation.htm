<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>

        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>

            }
        });
