<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<div id="demo">
    <button onclick="useInnerText()">Use InnerText</button>
</div>
<script>
    function useInnerText(){
        document.getElementById("demo").innerText="<h2>Hello World</h2>";
    }
</script>
</body>
</html>
