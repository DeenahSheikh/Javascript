<body>
    <script>
        let marks={
    math:Number(prompt("Enter maths marks")),
    science:Number(prompt("Enter science marks")),
    english:Number(prompt("Enter english marks")),
    hindi:Number(prompt("Enter hindi marks"))
};

for(let subject in marks){
    sum+= marks[subject];
}
alert("Total = "+sum);
    </script>
